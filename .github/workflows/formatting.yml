name: Formatting

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review

permissions:
    contents: read

jobs:
    formatting:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
        steps:
            - name: Check out pull request branch
              if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.head_ref }}

            - name: Check out pull request for read-only check
              if: github.event.pull_request.head.repo.full_name != github.repository || github.actor == 'dependabot[bot]'
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Apply formatting
              if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
              run: npm run format

            - name: Commit formatting changes to pull request
              if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
              run: |
                  if [[ -z "$(git status --porcelain)" ]]; then
                    echo "No formatting changes required."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add --all
                  git commit -m "style: apply automated formatting"
                  git push

            - name: Check formatting without modifying pull request
              if: github.event.pull_request.head.repo.full_name != github.repository || github.actor == 'dependabot[bot]'
              run: npm run format:check
