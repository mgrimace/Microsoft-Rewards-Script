name: Formatting Check

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
    workflow_dispatch:

concurrency:
    group: formatting-check-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    check-formatting:
        name: Check formatting
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Check formatting and show suggested changes
              shell: bash
              run: |
                  npm run format

                  if git diff --quiet; then
                    echo "Formatting is correct."
                    exit 0
                  fi

                  git diff --no-color > /tmp/formatting.diff
                  diff_lines=$(wc -l < /tmp/formatting.diff)

                  {
                    echo "## Formatting changes required"
                    echo
                    echo "Run the following command locally, then commit the changes:"
                    echo
                    echo '```bash'
                    echo 'npm run format'
                    echo '```'
                    echo
                    echo "### Suggested diff"
                    echo
                    echo '```diff'
                    sed -n '1,400p' /tmp/formatting.diff
                    echo '```'

                    if [ "$diff_lines" -gt 400 ]; then
                      echo
                      echo "Diff truncated to the first 400 of $diff_lines lines."
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"

                  echo "Formatting changes are required. Run 'npm run format' locally."
                  exit 1
